name: Deploy viewer to Cloudflare Pages

# Builds the Astro viewer as a static site and deploys it to Cloudflare
# Pages. On push to `main` this publishes to the production environment
# of the configured Pages project; on pull requests it publishes to a
# per-branch preview URL that wrangler prints in the job summary.
#
# Requires three repo-level secrets:
#   CLOUDFLARE_API_TOKEN  — a token scoped to "Pages:Edit" for the target
#                           account
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account that owns the Pages
#                           project
#   CLOUDFLARE_PAGES_PROJECT — the Pages project name (e.g. "papyri-viewer")
#
# The build step generates and ingests the in-tree `examples/papyri.toml`
# bundle so the deployed site has real content (papyri's own docs).
# Other example TOMLs can be added to the matrix-like loop in the
# "Generate + ingest bundles" step.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Allow the deploy step to comment a preview URL on pull requests.
  pull-requests: write
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip forks on PRs — they cannot access the Cloudflare secrets.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install papyri
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate + ingest bundles
        run: |
          # Papyri documents itself via examples/papyri.toml. Add more
          # TOMLs here to publish their bundles alongside.
          papyri gen examples/papyri.toml --no-infer
          for d in ~/.papyri/data/*/; do
            papyri ingest "$d"
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: viewer/pnpm-lock.yaml

      - name: Install viewer deps
        working-directory: viewer
        run: pnpm install --frozen-lockfile

      - name: Build static site
        working-directory: viewer
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy viewer/dist
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.head_ref || github.ref_name }}
