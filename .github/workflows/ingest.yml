name: Ingest (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ingest.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ingest.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      # No version pin: action-setup reads it from the root package.json
      # "packageManager" field — the single source shared with the Dockerfile.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Lint / format / type-check live in `.github/workflows/lint.yml`
      # (alongside the viewer checks); this workflow runs only the build
      # and unit-test steps.
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm --filter papyri-ingest run test
      - name: Build
        run: pnpm --filter papyri-ingest run build
