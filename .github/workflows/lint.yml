name: Linters

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: 'Reason'
        required: false
        default: 'Just Cause'

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/lint.yml'
            typescript:
              - 'viewer/**'
              - 'ingest/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/lint.yml'

  build:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        persist-credentials: false
    - name: Set up Python 3.14
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.14"
        cache: 'pip'
    - name: Install uv
      run: pip install uv
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements-dev.txt
        uv pip install --system types-requests types-cachetools types-toml
        uv pip install --system -e .
    - name: Lint with ruff
      run: |
        python -m ruff check papyri
    - name: Format check with ruff
      if: always()
      run: |
        python -m ruff format --check papyri
    - name: Test with mypy
      if: always()
      run: |
        python -m mypy papyri

  typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        persist-credentials: false
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: latest
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: "pnpm-lock.yaml"
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Lint with ESLint (viewer)
      run: pnpm --filter papyri-viewer run lint
    - name: Format check with Prettier (viewer)
      if: always()
      run: pnpm --filter papyri-viewer run format:check
    - name: Check TypeScript (Astro)
      if: always()
      run: pnpm --filter papyri-viewer run check
