name: Linters

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: 'Reason'
        required: false
        default: 'Just Cause'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/lint.yml'

  build:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'pip'
    - name: Install uv
      run: pip install uv
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements-dev.txt
        uv pip install --system types-requests types-cachetools types-toml
        uv pip install --system -e .
    - name: Lint with ruff
      run: |
        python -m ruff check papyri
    - name: Format check with ruff
      if: always()
      run: |
        python -m ruff format --check papyri
    - name: Test with mypy
      if: always()
      run: |
        python -m mypy papyri
