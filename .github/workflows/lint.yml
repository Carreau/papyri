name: Linters

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: 'Reason'
        required: false
        default: 'Just Cause'

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/lint.yml'

  build:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        persist-credentials: false
    - name: Set up Python 3.14
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.14"
        cache: 'pip'
    - name: Install uv
      run: pip install uv
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements-dev.txt
        uv pip install --system types-requests types-cachetools types-toml
        uv pip install --system -e .
    - name: Lint with ruff
      run: |
        python -m ruff check papyri
    - name: Format check with ruff
      if: always()
      run: |
        python -m ruff format --check papyri
    - name: Test with mypy
      if: always()
      run: |
        python -m mypy papyri
