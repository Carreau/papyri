# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: 'Reason'
        required: false
        default: 'Just Cause'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lib: 'astropy'
            python-version: "3.14"
          - lib: 'papyri'
            python-version: "3.14"
          - lib: 'IPython'
            python-version: "3.14"
          - lib: 'numpy'
            python-version: "3.14"
            flags: '--no-narrative --no-exec'
          - lib: 'scipy'
            python-version: "3.14"
            flags: '--no-narrative --no-exec'

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        flit install --symlink
    - name: dependency tree
      run: |
        pipdeptree
    - name: dependency tree (reversed)
      run: |
        pipdeptree -r
    - name: Gen ${{matrix.lib}}
      run: |
        pip install ${{matrix.lib}}
        coverage run -a -m papyri gen examples/${{matrix.lib}}.toml  --no-infer ${{matrix.flags}}
        sleep 1 # time for coverage to write its stuff
        papyri pack
        ls ~/.papyri/data/cbor
    - uses: actions/upload-artifact@v4
      with:
        name: doc-bundles-${{matrix.lib}}
        path: ~/.papyri/data/cbor/*.zip
    - name: Convert .coverage sql to xml for upload
      run: |
        coverage report
        coverage xml
        ls -la
    - name: "Upload coverage to Codecov"
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
  ingest:

    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        flit install --symlink
    - name: Test with pytest
      run: |
        pip install scipy dask
        pytest --cov=papyri --cov-append -m "not postingest"
        ls -al
    - uses: actions/download-artifact@v4
      with:
        pattern: doc-bundles-*
        path: ~/.papyri/data/cbor/
        merge-multiple: true

    - name: Misc cli
      run: |
        coverage run -a -m papyri --help
        ls -al
    - name: Ingest
      run: |
        for z in ~/.papyri/data/cbor/*.zip; do
          d="${z%.zip}"
          mkdir -p "$d"
          unzip -o "$z" -d "$d"
          coverage run -a -m papyri ingest "$d"
        done
    - name: Relink
      run: |
        coverage run -a -m papyri relink

    - name: Convert .coverage sql to xml for upload
      run: |
        coverage report
        coverage xml
        ls -la
    - name: "Upload coverage to Codecov"
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
