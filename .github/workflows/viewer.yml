name: Viewer

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.dockerignore'
      - '.github/workflows/viewer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'viewer/**'
      - 'ingest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.dockerignore'
      - '.github/workflows/viewer.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter papyri-viewer run check
      - name: Unit tests
        run: pnpm --filter papyri-viewer run test
      - name: Build (no bundles)
        run: pnpm --filter papyri-viewer run build

  check-docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@b5ca514318bd5df9d27f4b62fba424246b225b7b  # v3.10.0
      - name: Build Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: viewer/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
