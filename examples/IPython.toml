[global]
module = 'IPython'
logo = "img/ipython-logo.png"
exec_failure = "fallback"
docs_path = "~/dev/IPython/docs/source"
execute_doctests = true
execute_exclude_patterns = [
   'IPython.core.display_functions:display'
]
exclude = []
# Exclude Sphinx-generated API stubs and build artefacts that are not
# human-authored prose.  These files typically use ``.. automodule::`` /
# ``.. autoclass::`` directives that have no meaning outside a Sphinx build.
narrative_exclude = [
    "api/generated",
    "_build",
    "config/api",
]
[global.expected_errors]
IncorrectInternalDocsLen = [
    "IPython.core.magics.namespace:NamespaceMagics.xdel",
]
[global.implied_imports]
get_ipython = 'IPython:get_ipython'


[meta]
github_slug = 'IPython/IPython'
tag = '9.13.0'
pypi = 'ipython'
homepage = 'https://ipython.org/'
docspage = 'https://ipython.readthedocs.org/'
