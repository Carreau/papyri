[global]

module = 'numpy'

exclude = [
    'numpy:tensordot',
    # See https://github.com/jupyter/papyri/issues/361'
    'numpy.ma.core:MaskedArray.resize',
    # Docstring trips NumpydocParseError; not worth a special-case fix yet.
    'numpy.polynomial._polybase:ABCPolyBase',
    # Internal helper with a malformed docstring (IncorrectInternalDocsLen).
    'numpy._core._internal:_view_is_safe',
]

execute_exclude_patterns = [
    'numpy:set_numeric_ops',
    'numpy._',
    'numpy.testing._priv',
    'numpy.errstate',
    'numpy.seterr',
    'numpy.bincount',
    'numpy.core._multiarray_umath.bincount',
    'numpy.core._multiarray_umath.datetime_as_string',
    'numpy.core._multiarray_umath.normalize_axis_index',
    'numpy.core._multiarray_umath.shares_memory',
    'numpy.datetime_as_string',
    'numpy.shares_memory',
    'numpy.squeeze',
    'numpy.average',
    'numpy.ctypeslib',
    'numpy.append',
    'numpy.ma.core',
    'numpy.core.umath_tests',
    # try to create a pager that waits for input
    'numpy.lookfor',
    # write directly to stdout
    'numpy.info',
    # Misc
    'numpy.distutils',
    'numpy.char.multiply',
    'numpy.polynomial.chebyshev.chebinterpolate',
    'numpy.lib.npyio._read',
    'numpy.polynomial._polybase:ABCPolyBase',
    'numpy.distutils.misc_util:Configuration.__init__',
    'numpy.ma.core:MaskedArray.resize', # First line of docstring is a directive; breaks parsing
]

submodules = [
    'core',
    'ctypeslib',
    'doc',
    'fft',
    'lib',
    'linalg',
    'ma',
    'matlib',
    'matrixlib',
    'polynomial',
    'random',
    'testing',
    'tests',
    'typing',
    'version',
]

docs_path = '~/dev/numpy/doc/source'

execute_doctests = true
narrative_exclude = [
   'doc/source/reference/arrays.ndarray.rst',
   'doc/source/user/how-to-how-to.rst',
   'doc/source/f2py/usage.rst',
   'doc/source/_templates/',
]
exec_failure = 'fallback'
source = 'https://github.com/numpy/numpy'
homepage = 'https://numpy.org'
docs = 'https://numpy.org/doc/stable/'
logo = './img/numpy_logo.png'
early_error = false

[meta]
github_slug = 'numpy/numpy'
tag = 'v{version}'
pypi = 'numpy'
homepage = 'https://numpy.org/'
docspage = 'https://numpy.org/doc/1.26/'

[global.directives]
"c:enum"   = 'papyri.directives:drop'
"c:function"   = 'papyri.directives:drop'
"c:macro"   = 'papyri.directives:drop'
"c:member"   = 'papyri.directives:drop'
"c:struct"   = 'papyri.directives:drop'
"c:type"   = 'papyri.directives:drop'
"c:var"   = 'papyri.directives:drop'
"tab-set"   = 'papyri.directives:drop'
"try_examples"   = 'papyri.directives:drop'
attribute   = 'papyri.directives:drop'
autoattributes   = 'papyri.directives:drop'
automethod   = 'papyri.directives:drop'
autoproperty   = 'papyri.directives:drop'
currentmodule   = 'papyri.directives:drop'
data   = 'papyri.directives:drop'
doxygenfunction   = 'papyri.directives:drop'
doxygenclass   = 'papyri.directives:drop'
function   = 'papyri.directives:drop'
glossary   = 'papyri.directives:drop'
grid   = 'papyri.directives:drop'
index   = 'papyri.directives:drop'
ipython   = 'papyri.directives:drop'
legacy   = 'papyri.directives:drop'
moduleauthor   = 'papyri.directives:drop'
sectionauthor   = 'papyri.directives:drop'
table   = 'papyri.directives:drop'
testcleanup   = 'papyri.directives:drop'
testcode   = 'papyri.directives:drop'
testsetup   = 'papyri.directives:drop'
