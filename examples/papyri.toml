[global]
module = 'papyri'
submodules = ['examples']
examples_folder = '~/dev/papyri/docs/examples/'
logo = "../papyri-logo.png"
docs_path = "~/dev/papyri/docs"
execute_doctests = true
exec_failure = 'raise'
exclude= ["papyri.utils:FullQual","papyri.utils:Canonical" ]
# Directives to drop silently (shorthand for mapping each to papyri.directives:drop).
# Useful for Sphinx-specific directives that have no IR equivalent.
# skip_directives = ["testsetup", "testcleanup", "plot"]

[global.directives]
mydirective='papyri.examples:_mydirective_handler'
# Any directive can also be dropped explicitly:
# testsetup = 'papyri.directives:drop'


[meta]
github_slug = 'jupyter/papyri'
tag = '{{version}}'
pypi = 'papyri'
